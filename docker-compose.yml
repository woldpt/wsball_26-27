services:
  backend:
    build: ./server
    restart: unless-stopped
    env_file:
      - ./server/.env
    ports:
      - "3000:3000"
    volumes:
      - ./server/db:/app/db
    networks:
      - cftunnel
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/health', r => { r.statusCode === 200 ? process.exit(0) : process.exit(1) }).on('error', () => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build: ./client
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      cftunnel:
        ipv4_address: 172.100.0.57

networks:
  cftunnel:
    external: true
